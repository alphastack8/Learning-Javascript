<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="replaceParent">
    <span id="old">Old text</span>
    </div>
<script>
    const newSpan = document.createElement('span');
    newSpan.textContent = 'New text';
    const parent = document.getElementById('replaceParent');
    const old = document.getElementById('old');
    parent.replaceChild(newSpan, old);
</script>
</body>
</html>
