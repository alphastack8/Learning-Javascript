<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul id="insertList">
    <li id="second">Second</li>
    </ul>
<script>
    const newLi = document.createElement('li');
    newLi.textContent = 'First';
    const parent = document.getElementById('insertList');
    const reference = document.getElementById('second');
    parent.insertBefore(newLi, reference);
</script>
</body>
</html>
