<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul id="removeList">
        <li id="removeItem">Remove me</li>
    </ul>
<script>
    const parent = document.getElementById('removeList');
    const child = document.getElementById('removeItem');
    parent.removeChild(child);
</script>
</body>
</html>
