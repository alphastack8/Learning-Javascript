<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>.dark { background: black; color: white; }</style>
<button id="toggleBtn">Toggle Dark</button>
<p id="toggleText">Toggle my class</p>
<script>
    document.getElementById('toggleBtn').onclick = () => {
        document.getElementById('toggleText').classList.toggle('dark');
    };
</script>
</body>
</html>
